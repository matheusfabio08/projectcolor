version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: colortim
      POSTGRES_PASSWORD: colortim123
      POSTGRES_DB: projectcolor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colortim -d projectcolor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
